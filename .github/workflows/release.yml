name: Release Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-jar:
    name: Build Fat JAR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven (fat JAR)
        run: |
          chmod +x mvnw
          ./mvnw -B clean package

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v6
        with:
          name: mcservergui-jar
          path: target/McServerGUI.jar

  package-native:
    name: Package Native Installers
    needs: build-jar
    runs-on: ${{ matrix.os }}
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: ./build-scripts/package-windows.sh
            artifact_glob: dist/*.msi
            javafx_platform: win
          - os: macos-latest
            script: ./build-scripts/package-macos.sh
            artifact_glob: dist/*.dmg
            javafx_platform: mac
          - os: ubuntu-latest
            script: ./build-scripts/package-linux.sh
            artifact_glob: dist/*
            javafx_platform: linux
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build with Maven (fat JAR)
        run: |
          chmod +x mvnw
          ./mvnw -B -Djavafx.platform=${{ matrix.javafx_platform }} clean package

      - name: Install WiX Toolset (Windows only)
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          choco install wixtoolset -y
          echo "C:\Program Files (x86)\WiX Toolset v3.11\bin" >> $env:GITHUB_PATH

      - name: Make script executable
        shell: bash
        run: chmod +x ${{ matrix.script }}

      - name: Run jpackage script
        shell: bash
        run: ${{ matrix.script }}

      - name: Upload native artifact
        uses: actions/upload-artifact@v6
        with:
          name: native-${{ matrix.os }}
          path: "${{ matrix.artifact_glob }}"
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    needs:
      - build-jar
      - package-native
    if: always() && needs.build-jar.result == 'success' && needs.package-native.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets

      - name: Flatten assets
        shell: bash
        run: |
          mkdir -p upload
          find release-assets -type f -exec cp {} upload/ \;
          ls -la upload

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: "upload/*"
          draft: false
          prerelease: ${{ startsWith(github.ref_name, 'v0.') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
